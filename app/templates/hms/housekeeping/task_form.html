{% extends "hms/layout/base.html" %}
{% block title %}Create Housekeeping Task — Hotel PMS{% endblock %}

{% block content %}
<div class="container-xl" style="max-width:680px;">

  <!-- ── Header ── -->
  <div class="page-header d-print-none mb-4">
    <div class="row align-items-center">
      <div class="col">
        <div class="d-flex align-items-center gap-2 mb-1">
          <a href="{{ url_for('hms.housekeeping') }}" class="text-muted" style="font-size:.82rem;text-decoration:none;">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            Housekeeping
          </a>
          <span class="text-muted" style="font-size:.82rem;">/</span>
          <span style="font-size:.82rem;">Create Task</span>
        </div>
        <h2 class="page-title mb-0">Create Task</h2>
        <div class="text-muted" style="font-size:.82rem;">Schedule a cleaning or maintenance task</div>
      </div>
      <div class="col-auto ms-auto">
        <a href="{{ url_for('hms.housekeeping') }}" class="btn btn-outline-secondary">
          <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          Back to Board
        </a>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-body">
      <form method="POST" action="#">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

        <div class="row g-3">

          <!-- Room -->
          <div class="col-md-6">
            <label class="form-label required">Room</label>
            <select name="room_id" class="form-select" required>
              <option value="">Select a room…</option>
              {% for room in rooms %}
              <option value="{{ room.id }}">
                {{ room.room_number }}{% if room.room_type %} — {{ room.room_type.name }}{% endif %}
                ({{ room.status }})
              </option>
              {% endfor %}
            </select>
          </div>

          <!-- Task Type -->
          <div class="col-md-6">
            <label class="form-label required">Task Type</label>
            <select name="task_type" class="form-select" required>
              {% for t in [
                ('regular_clean','Regular Clean'),
                ('deep_clean','Deep Clean'),
                ('checkout_clean','Checkout Clean'),
                ('maintenance','Maintenance'),
                ('inspection','Inspection'),
                ('other','Other')
              ] %}
              <option value="{{ t[0] }}">{{ t[1] }}</option>
              {% endfor %}
            </select>
          </div>

          <!-- Priority -->
          <div class="col-md-6">
            <label class="form-label required">Priority</label>
            <select name="priority" class="form-select" required>
              <option value="low">Low</option>
              <option value="normal" selected>Normal</option>
              <option value="high">High</option>
              <option value="urgent">Urgent</option>
            </select>
          </div>

          <!-- Estimated Duration -->
          <div class="col-md-6">
            <label class="form-label">Est. Duration</label>
            <div class="input-group">
              <input type="number" name="estimated_duration" class="form-control" min="1" placeholder="30">
              <span class="input-group-text">min</span>
            </div>
          </div>

          <!-- Notes -->
          <div class="col-12">
            <label class="form-label">Notes</label>
            <textarea name="notes" class="form-control" rows="3"
                      placeholder="Special instructions for housekeeping staff…"></textarea>
          </div>

        </div>

        <div class="form-footer mt-4">
          <button type="submit" class="btn btn-primary">
            <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Create Task
          </button>
          <a href="{{ url_for('hms.housekeeping') }}" class="btn btn-link">Cancel</a>
        </div>

      </form>
    </div>
  </div>

</div>
{% endblock %}
