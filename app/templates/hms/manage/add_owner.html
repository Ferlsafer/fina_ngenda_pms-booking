{% extends "hms/layout/base.html" %}
{% block title %}Add Owner{% endblock %}

{% block content %}
<div class="page-header d-print-none">
  <div class="row align-items-center">
    <div class="col">
      <nav class="mb-2">
        <a href="{{ url_for('hms.manage_owners') }}" class="text-muted">Owners</a>
        <span class="text-muted mx-1">/</span>
        <span>Add Owner</span>
      </nav>
      <h2 class="page-title">Add Owner</h2>
    </div>
  </div>
</div>

<div class="row">
  <div class="col-lg-5">
    <div class="card">
      <div class="card-body">
        <form method="POST" action="{{ url_for('hms.add_owner') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label required">Full Name</label>
            <input type="text" name="name" class="form-control" required placeholder="John Doe">
          </div>
          <div class="mb-3">
            <label class="form-label required">Email</label>
            <input type="email" name="email" class="form-control" required placeholder="owner@example.com">
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Create Owner</button>
            <a href="{{ url_for('hms.manage_owners') }}" class="btn btn-link">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
